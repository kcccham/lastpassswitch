<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LastPass Switch</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <svg class="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="48" height="48">
        <defs>
          <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
          </linearGradient>
        </defs>
        <rect width="128" height="128" rx="28" fill="url(#grad)"/>
        <rect x="28" y="50" width="72" height="36" rx="18" fill="white" opacity="0.25"/>
        <circle cx="82" cy="68" r="12" fill="#4ade80"/>
        <path d="M 82 62 L 82 68" stroke="white" stroke-width="2" stroke-linecap="round"/>
        <path d="M 82 68 A 5 5 0 1 1 82 68.1" stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/>
        <text x="46" y="78" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="white" opacity="0.8">L</text>
      </svg>
      <h1>LastPass Switch</h1>
    </div>

    <div class="toggle-container">
      <label class="switch">
        <input type="checkbox" id="toggle">
        <span class="slider"></span>
      </label>
      <span id="status" class="status">Checking...</span>
    </div>

    <div id="error" class="error hidden"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
